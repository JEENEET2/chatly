name: Build Desktop (Linux)

on:
  push:
    branches: ["**"]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-linux.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-linux.yml"
  workflow_dispatch:

# This workflow mirrors TDesktop's official Linux CI
# (https://github.com/telegramdesktop/tdesktop/blob/dev/.github/workflows/linux.yml)
# adapted to overlay Chatly's branding before building.
#
# First-run cost on a clean cache: many hours (Qt + ffmpeg + everything else
# is built inside the centos_env image). Subsequent runs reuse the buildx cache.

jobs:
  build:
    name: Chatly Desktop (Linux, debug)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      UPSTREAM_DIR: ${{ github.workspace }}/upstream-cache/tdesktop
      IMAGE_TAG: chatly-tdesktop:centos_env

    steps:
      - name: Checkout Chatly
        uses: actions/checkout@v4

      - name: Read pinned upstream ref
        id: pin
        run: |
          pin=$(grep -v '^[[:space:]]*#' apps/desktop/upstream.txt | grep -v '^[[:space:]]*$' | head -n1)
          echo "url=$(echo "$pin" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$pin" | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache upstream clone
        uses: actions/cache@v4
        with:
          path: upstream-cache/tdesktop
          key: tdesktop-src-${{ steps.pin.outputs.ref }}

      - name: Clone upstream TDesktop
        run: |
          if [ ! -d "$UPSTREAM_DIR/.git" ]; then
            git clone --depth 1 --branch "${{ steps.pin.outputs.ref }}" \
              --recurse-submodules --shallow-submodules \
              "${{ steps.pin.outputs.url }}" "$UPSTREAM_DIR"
          else
            git -C "$UPSTREAM_DIR" reset --hard
            git -C "$UPSTREAM_DIR" submodule update --init --recursive --depth 1
          fi

      - name: Apply Chatly overlay + patches
        run: |
          if [ -d apps/desktop/overlay ] && [ -n "$(ls -A apps/desktop/overlay 2>/dev/null | grep -v gitkeep)" ]; then
            cp -R apps/desktop/overlay/. "$UPSTREAM_DIR/"
          fi
          if [ -d apps/desktop/patches ]; then
            for p in apps/desktop/patches/*.patch; do
              [ -e "$p" ] || continue
              echo "Applying $(basename "$p")"
              git -C "$UPSTREAM_DIR" apply --whitespace=nowarn "$p"
            done
          fi

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Install poetry and generate Dockerfile
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
          cd "$UPSTREAM_DIR/Telegram/build/docker/centos_env"
          poetry install --no-interaction --no-ansi
          DOCKERFILE=$(DEBUG= LTO= poetry run gen_dockerfile)
          echo "$DOCKERFILE" > Dockerfile
          rm -rf __pycache__

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Libraries cache (centos_env image)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/.buildx-cache
          key: ${{ runner.OS }}-tdesktop-libs-${{ steps.pin.outputs.ref }}-${{ hashFiles(format('{0}/Telegram/build/docker/centos_env/**', env.UPSTREAM_DIR)) }}
          restore-keys: ${{ runner.OS }}-tdesktop-libs-

      - name: Build libraries image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.UPSTREAM_DIR }}/Telegram/build/docker/centos_env
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=local,src=${{ runner.temp }}/.buildx-cache
          cache-to: type=local,dest=${{ runner.temp }}/.buildx-cache-new,mode=max

      - name: Move buildx cache
        run: |
          rm -rf ${{ runner.temp }}/.buildx-cache
          mv ${{ runner.temp }}/.buildx-cache-new ${{ runner.temp }}/.buildx-cache

      - name: Build TDesktop (Chatly)
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          if [ -z "$TELEGRAM_API_ID" ] || [ -z "$TELEGRAM_API_HASH" ]; then
            echo '::warning::TELEGRAM_API_ID / TELEGRAM_API_HASH are not set as repo secrets.'
            echo '::warning::Using TDESKTOP_API_TEST mode. The binary will NOT be able to log in to real Telegram.'
            API_TEST="-D TDESKTOP_API_TEST=ON"
          else
            API_TEST="-D TDESKTOP_API_ID=$TELEGRAM_API_ID -D TDESKTOP_API_HASH=$TELEGRAM_API_HASH"
          fi

          docker run --rm \
            -u $(id -u) \
            -v "$UPSTREAM_DIR":/usr/src/tdesktop \
            -e CONFIG=Debug \
            "$IMAGE_TAG" \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D CMAKE_CONFIGURATION_TYPES=Debug \
            -D CMAKE_C_FLAGS_DEBUG="-O0 -fuse-ld=lld" \
            -D CMAKE_CXX_FLAGS_DEBUG="-O0 -fuse-ld=lld" \
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON \
            -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
            $API_TEST

      - name: Collect artifact
        run: |
          mkdir -p apps/desktop/out
          if [ -f "$UPSTREAM_DIR/out/Debug/Telegram" ]; then
            cp "$UPSTREAM_DIR/out/Debug/Telegram" apps/desktop/out/Chatly
          fi
          if [ -f "$UPSTREAM_DIR/out/Debug/Updater" ]; then
            cp "$UPSTREAM_DIR/out/Debug/Updater" apps/desktop/out/
          fi
          ls -la apps/desktop/out
          tar -C apps/desktop/out -czf Chatly-linux.tar.gz .

      - name: Upload Linux artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Chatly-Linux
          path: Chatly-linux.tar.gz
          if-no-files-found: warn
          retention-days: 14
