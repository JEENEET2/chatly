name: Build Desktop (Windows)

on:
  # NOTE: Disabled by default. The upstream TDesktop Windows build (see
  # https://github.com/telegramdesktop/tdesktop/blob/dev/.github/workflows/win.yml)
  # is ~240 lines of complex multi-stage setup: prepare.py builds all
  # third-party deps from source (Qt, ffmpeg, OpenSSL, ranges-v3, etc.),
  # then tdesktop links against them. Getting that green for Chatly is
  # genuinely days of work and outside the scope of the scaffolding PR.
  #
  # Enable when ready by re-adding `push:` / `pull_request:` triggers and
  # by replacing the placeholder step below with a port of upstream's win.yml.
  workflow_dispatch:

jobs:
  build:
    name: Chatly Desktop (Windows) — placeholder
    runs-on: windows-2022

    steps:
      - name: Not yet implemented
        shell: pwsh
        run: |
          Write-Host '::warning::Windows desktop build is not yet wired up.'
          Write-Host '::warning::See docs/ROADMAP.md (Phase 4) and the comment at'
          Write-Host '::warning::the top of .github/workflows/desktop-windows.yml for the plan.'
          Write-Host '::warning::Until then, Windows users can run the Chatly Linux/AppImage'
          Write-Host '::warning::build via WSL, or wait for Phase 4.'
          exit 0
