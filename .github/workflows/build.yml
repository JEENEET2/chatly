name: Build ChatGram Android

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install NDK
        uses: android-actions/setup-android@v3
        # The actions/setup-java caches gradle dependencies, and setup-android configures sdk tools

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Standalone APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}

      - name: Find and Rename APKs
        run: |
          mkdir -p output/
          find TMessagesProj_AppStandalone/build/outputs/apk/ -name "*.apk" -exec cp {} output/ \;
          cd output
          mv app-universal.apk chatgram-universal.apk || true
          mv app-arm64-v8a.apk chatgram-arm64-v8a.apk || true
          mv app-armeabi-v7a.apk chatgram-armeabi-v7a.apk || true
          mv app-x86.apk chatgram-x86.apk || true
          mv app-x86_64.apk chatgram-x86_64.apk || true
          mv app.apk chatgram.apk || true
          echo "APKs successfully copied and renamed"
          ls -lh

      - name: Upload ChatGram APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatgram-apks
          path: output/
          if-no-files-found: error
